<!DOCTYPE html>
<html>
<head>
    <title>Detection Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card p-4">
        <h2 class="text-center mb-4">Detection Result</h2>

        <div class="text-center">
            <img src="/{{ image }}" class="img-fluid rounded">
        </div>

        <hr>

        <h4>Total Animals Detected: {{ count }}</h4>

        {% if herd %}
            <h3 class="text-danger">🚨 HERD DETECTED!</h3>
        {% else %}
            <h3 class="text-success">No Herd Detected</h3>
        {% endif %}

        <a href="/" class="btn btn-primary mt-3">Try Another Image</a>
    </div>
</div>

</body>
</html>
